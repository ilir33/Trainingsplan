<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ernährungsplan">
<title>Ernährungsplan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0c;color:#f0ede8;font-family:'Barlow',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.header{padding:48px 16px 12px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.header-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;font-weight:700;font-family:'Barlow Condensed',sans-serif}
.header h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:-.02em;line-height:1;margin:3px 0 7px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.08);border-radius:20px;padding:3px 9px;font-size:10px}
.person-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:14px;padding:4px;margin-top:10px;border:1px solid rgba(255,255,255,.1)}
.person-btn{flex:1;padding:8px;border-radius:11px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:'Barlow',sans-serif;transition:all .25s}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tab{display:none;padding:14px}
.tab.active{display:block}
.bottom-nav{display:flex;background:#111113;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px)}
.nav-btn{flex:1;padding:10px 4px 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#6b7280;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-top:2px solid transparent;transition:all .2s;font-family:'Barlow',sans-serif}
.nav-icon{font-size:20px}
.shift-toggle{display:flex;background:#141416;border-radius:14px;padding:4px;margin-bottom:14px;border:1px solid rgba(255,255,255,.08)}
.shift-btn{flex:1;padding:9px;border-radius:11px;border:none;cursor:pointer;font-weight:700;font-size:13px;font-family:'Barlow',sans-serif;transition:all .25s;background:transparent;color:#6b7280}
.stats-box{border-radius:16px;padding:14px;margin-bottom:14px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.stat-item{background:rgba(255,255,255,.06);border-radius:12px;padding:10px;text-align:center}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;line-height:1}
.stat-label{font-size:10px;color:#9ca3af;margin-top:3px}
.stat-sub{font-size:9px;color:#6b7280}
.meal-card{background:#141416;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:10px}
.meal-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.meal-time-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:4px}
.meal-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.meal-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.meal-body{display:none;margin-top:12px}
.meal-body.open{display:block}
.option{background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;margin-bottom:8px;border-left:3px solid}
.option-title{font-weight:700;font-size:13px;margin-bottom:5px}
.option-item{font-size:12px;color:#9ca3af;padding:2px 0;line-height:1.4}
.macro-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.macro{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.07);color:#9ca3af}
.prep-box{border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid}
.prep-title{font-weight:700;font-size:14px;margin-bottom:6px}
.prep-item{font-size:12px;color:#9ca3af;padding:3px 0;line-height:1.4}
.tip-card{background:#141416;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:10px;display:flex;gap:12px}
.tip-icon{font-size:24px;flex-shrink:0}
.tip-title{font-weight:700;font-size:14px;margin-bottom:4px}
.tip-text{font-size:12px;color:#9ca3af;line-height:1.5}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;margin-bottom:4px}
.section-sub{font-size:12px;color:#9ca3af;margin-bottom:14px;line-height:1.5}
.footer{text-align:center;color:#374151;font-size:11px;margin-top:16px;padding-bottom:8px}
.expand-arrow{color:#6b7280;font-size:14px;flex-shrink:0;transition:transform .2s}
.alert-box{border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:12px;line-height:1.6}
.alert-title{font-weight:700;font-size:14px;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="main-header">
    <div class="header-label" id="header-label">Ernährungsplan</div>
    <h1 id="header-title">Schichtdienst</h1>
    <div class="badges" id="header-badges"></div>
    <div class="person-toggle">
      <button class="person-btn" id="btn-mann" onclick="setPerson('mann')">👨 Mein Plan</button>
      <button class="person-btn" id="btn-frau" onclick="setPerson('frau')">👩 Frau</button>
    </div>
  </div>

  <div class="content">
    <div class="tab active" id="tab-meals">
      <div class="shift-toggle" id="shift-div">
        <button class="shift-btn" id="btn-tag" onclick="setShift('tag')">☀️ Tagdienst 07–19:30</button>
        <button class="shift-btn" id="btn-nacht" onclick="setShift('nacht')">🌙 Nachtschicht 19–07:30</button>
      </div>
      <div class="stats-box" id="stats-box"></div>
      <div id="alert-box"></div>
      <div class="section-title" id="meals-title"></div>
      <div class="section-sub" id="meals-sub"></div>
      <div id="meals-content"></div>
      <div class="footer" id="meals-footer"></div>
    </div>

    <div class="tab" id="tab-prep">
      <div class="section-title" id="prep-title"></div>
      <div class="section-sub">Was du vorbereiten solltest um Zeit zu sparen</div>
      <div id="prep-content"></div>
      <div class="footer">Vorbereitung ist der halbe Erfolg! 💪</div>
    </div>

    <div class="tab" id="tab-tips">
      <div class="section-title">Tipps für Schichtdienst</div>
      <div class="section-sub">Speziell für 12,5h Schichten mit nur 30 Min Pause</div>
      <div id="tips-content"></div>
      <div class="footer" id="tips-footer"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-meals" onclick="switchTab('meals')"><span class="nav-icon">🍽️</span>Mahlzeiten</button>
    <button class="nav-btn" id="nav-prep" onclick="switchTab('prep')"><span class="nav-icon">🥡</span>Meal Prep</button>
    <button class="nav-btn" id="nav-tips" onclick="switchTab('tips')"><span class="nav-icon">💡</span>Tipps</button>
  </div>
</div>

        {title:"🥡 Wöchentliche Vorbereitung (Sonntag)",color:"#c77dff",items:["✅ Hähnchen vorkochen (für 3–4 Tage)","✅ Gemüse waschen & schneiden","✅ Overnight Oats für Mo & Di vorbereiten","✅ Eier hart kochen","✅ Gemüsesticks in Portionen aufteilen","⏱️ Zeitaufwand: ca. 45 Min Sonntag"]},
        {title:"💡 Einfache Regeln",color:"#2a9d8f",items:["🥗 Teller: ½ Gemüse, ¼ Protein, ¼ Carbs","💧 Vor jeder Mahlzeit 1 Glas Wasser","🐌 Langsam essen — 20 Min bis zur Sättigung","🚫 Keine Softdrinks oder Säfte"]},
      ],
      nacht:[
        {title:"🥡 Gleiche Vorbereitung",color:"#c77dff",items:["Sonntags meal preppen wie beim Tagplan","Overnight Oats vorbereiten","Gemüse schneiden","Hähnchen vorkochen"]},
      ]
    },
    tips:[
      {icon:"💧",title:"Wasser vor dem Essen",text:"Immer ein großes Glas Wasser vor jeder Mahlzeit. Reduziert den Hunger und hilft beim Abnehmen."},
      {icon:"🥗",title:"Teller-Methode",text:"Hälfte Gemüse, Viertel Protein, Viertel Kohlenhydrate. Einfache Regel für jede Mahlzeit!"},
      {icon:"🐌",title:"Langsam essen",text:"20 Minuten braucht der Körper um Sättigung zu melden. Langsam kauen = weniger essen unbewusst."},
      {icon:"🍳",title:"Sonntag Meal Prep",text:"45 Min Vorbereitung am Sonntag spart täglich Zeit und verhindert schlechte spontane Entscheidungen."},
      {icon:"📏",title:"Maßband statt Waage",text:"Bauch, Taille und Hüfte messen ist besser. Muskeln wiegen mehr als Fett — die Waage lügt!"},
      {icon:"😴",title:"Schlaf ist wichtig",text:"7–8 Stunden Schlaf. Schlafmangel erhöht das Hungerhormon Ghrelin — macht Abnehmen viel schwerer."},
      {icon:"🚫",title:"Diese Dinge meiden",text:"Softdrinks, Fruchtsäfte, Alkohol, Weißbrot täglich. Das sind die größten versteckten Kalorienfallen!"},
      {icon:"💜",title:"Keine Crash-Diät",text:"500 kcal Defizit ist perfekt. Mehr führt zu Jo-Jo Effekt. Langsam und nachhaltig ist der Gewinner!"},
    ],
    tipFooter:"Du schaffst das — Schritt für Schritt! 💜"
  }
};

let activePerson='mann', activeShift='tag', expandedMeals={};

function getColor(){return PLANS[activePerson].color}

function setPerson(p){
  activePerson=p; expandedMeals={};
  const plan=PLANS[p];
  document.getElementById('main-header').style.background=plan.gradient;
  document.getElementById('header-label').style.color=plan.color;
  document.getElementById('header-label').textContent=plan.label;
  document.getElementById('header-title').textContent=plan.title;
  document.getElementById('header-badges').innerHTML=plan.badges.map(b=>`<span class="badge">${b}</span>`).join('');
  document.getElementById('btn-mann').style.cssText=p==='mann'?`background:${PLANS.mann.color};color:#fff`:'background:transparent;color:#6b7280';
  document.getElementById('btn-frau').style.cssText=p==='frau'?`background:${PLANS.frau.color};color:#fff`:'background:transparent;color:#6b7280';
  document.querySelectorAll('.nav-btn.active').forEach(b=>b.style.borderTopColor=plan.color);
  renderAll();
  document.getElementById('shift-div').style.display=p==='mann'?'flex':'none';
}

function setShift(s){if(activePerson==='frau')return;
  activeShift=s; expandedMeals={};
  const c=getColor();
  document.getElementById('btn-tag').style.cssText=s==='tag'?`background:${c};color:#fff`:'background:transparent;color:#6b7280';
  document.getElementById('btn-nacht').style.cssText=s==='nacht'?`background:${c};color:#fff`:'background:transparent;color:#6b7280';
  renderMeals(); renderPrep();
}

function toggleMeal(i){expandedMeals[i]=!expandedMeals[i];renderMeals();}

function renderMeals(){
  const plan=PLANS[activePerson]; const c=plan.color;
  const shiftData=plan[activeShift]||plan.tag;
  
  document.getElementById('stats-box').style.cssText=`border-radius:16px;padding:14px;margin-bottom:14px;background:${c}15;border:1px solid ${c}35`;
  document.getElementById('stats-box').innerHTML=`<div style="font-weight:700;font-size:14px;color:${c};margin-bottom:10px">📊 Deine täglichen Ziele</div>
    <div class="stats-grid">${plan.stats.map(s=>`<div class="stat-item"><div class="stat-val" style="color:${c}">${s.val}</div><div class="stat-label">${s.label}</div><div class="stat-sub">${s.sub}</div></div>`).join('')}</div>`;

  const alert=shiftData.alert;
  document.getElementById('alert-box').innerHTML=`<div class="alert-box" style="background:${alert.color}18;border:1px solid ${alert.color}40;color:${alert.color}">${alert.text}</div>`;

  document.getElementById('meals-title').textContent='🍽️ Dein Tagesplan';
  document.getElementById('meals-title').style.color=c;
  document.getElementById('meals-sub').textContent='Tippe auf eine Mahlzeit für Details & Optionen';

  document.getElementById('meals-content').innerHTML=shiftData.meals.map((meal,mi)=>{
    const open=!!expandedMeals[mi];
    return`<div class="meal-card">
      <div class="meal-header" onclick="toggleMeal(${mi})">
        <div style="flex:1">
          <span class="meal-time-badge" style="background:${meal.timeColor}25;color:${meal.timeColor}">${meal.time}</span>
          <div class="meal-name">${meal.name}</div>
          ${meal.sub?`<div class="meal-sub">${meal.sub}</div>`:''}
        </div>
        <div class="expand-arrow" style="transform:${open?'rotate(180deg)':'none'}">▼</div>
      </div>
      <div class="meal-body ${open?'open':''}">
        ${meal.options.map(opt=>`<div class="option" style="border-left-color:${meal.timeColor}">
          <div class="option-title">${opt.title}</div>
          ${opt.items.map(i=>`<div class="option-item">• ${i}</div>`).join('')}
          <div class="macro-row">${opt.macros.map(m=>`<span class="macro">${m}</span>`).join('')}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('meals-footer').textContent=activePerson==='mann'?'Ernährungsplan · Muskelaufbau · Schichtdienst':'Ernährungsplan · Abnehmen · 76→60 kg';
}

function renderPrep(){
  const plan=PLANS[activePerson];
  const prepData=plan.prep[activeShift]||plan.prep.tag;
  document.getElementById('prep-title').textContent=activePerson==='mann'?'🥡 Meal Prep Schichtdienst':'🥡 Meal Prep Zuhause';
  document.getElementById('prep-title').style.color=plan.color;
  document.getElementById('prep-content').innerHTML=prepData.map(p=>`
    <div class="prep-box" style="background:${p.color}15;border-color:${p.color}35">
      <div class="prep-title" style="color:${p.color}">${p.title}</div>
      ${p.items.map(i=>`<div class="prep-item">${i}</div>`).join('')}
    </div>`).join('');
}

function renderTips(){
  const plan=PLANS[activePerson];
  document.getElementById('tips-content').innerHTML=plan.tips.map(t=>`
    <div class="tip-card">
      <div class="tip-icon">${t.icon}</div>
      <div><div class="tip-title">${t.title}</div><div class="tip-text">${t.text}</div></div>
    </div>`).join('');
  document.getElementById('tips-footer').textContent=plan.tipFooter;
}

function renderAll(){renderMeals();renderPrep();renderTips();}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>{b.classList.remove('active');b.style.borderTopColor='transparent';});
  document.getElementById('tab-'+name).classList.add('active');
  const btn=document.getElementById('nav-'+name);
  btn.classList.add('active');
  btn.style.borderTopColor=getColor();
  btn.style.color=getColor();
  document.querySelector('.content').scrollTop=0;
}

setPerson('mann');
setShift('tag');
</script>
</body>
</html>
